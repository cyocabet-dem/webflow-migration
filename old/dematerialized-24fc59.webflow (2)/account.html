  // NAV CONFIGURATIONS PER USER STATE

  const NAV_CONFIGS = {
    // State 1: Not logged in
    guest: [
      { id: 'home',     label: 'home',         href: '/',              icon: 'home' },
      { id: 'shop',     label: 'shop',         href: '/clothing',      icon: 'shop' },
      { id: 'how',      label: 'how it works', href: '/how-it-works',  icon: 'how' },
      { id: 'join',     label: 'join',         href: '/memberships',   icon: 'join' },
      { id: 'account',  label: 'log in',       href: '#',              icon: 'user', action: 'login' },
    ],
    // State 2: Logged in, no active membership
    member_inactive: [
      { id: 'home',     label: 'home',         href: '/',              icon: 'home' },
      { id: 'shop',     label: 'shop',         href: '/clothing',      icon: 'shop' },
      { id: 'wishlist', label: 'wishlist',      href: '/wishlist',      icon: 'wishlist' },
      { id: 'join',     label: 'join',         href: '/memberships',   icon: 'join' },
      { id: 'account',  label: 'account',      href: '/account',       icon: 'user' },
    ],
    // State 3: Active member (has Stripe subscription)
    member_active: [
      { id: 'home',     label: 'home',         href: '/',              icon: 'home' },
      { id: 'shop',     label: 'shop',         href: '/clothing',      icon: 'shop' },
      { id: 'wishlist', label: 'wish list',      href: '/wish-list',      icon: 'wishlist' },
      { id: 'faq',      label: 'faq',          href: '/faq',           icon: 'faq' },
      { id: 'account',  label: 'account',      href: '/account',       icon: 'user' },
    ]
  };
  // ============================================
  // SVG ICONS (Lucide-style, 24x24 viewBox)
  // ============================================
  const ICONS = {
    home: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/>
      <path d="M3 10a2 2 0 0 1 .709-1.528l7-5.999a2 2 0 0 1 2.582 0l7 5.999A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
    </svg>`,
    shop: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M16 10a4 4 0 0 1-8 0"/>
      <path d="M3.103 6.034h17.794"/>
      <path d="M3.4 5.467a2 2 0 0 0-.4 1.2V20a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6.667a2 2 0 0 0-.4-1.2l-2-2.667A2 2 0 0 0 17 2H7a2 2 0 0 0-1.6.8z"/>
    </svg>`,
    how: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 16v-4"/>
      <path d="M12 8h.01"/>
      <circle cx="12" cy="12" r="10"/>
    </svg>`,
    join: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/>
    </svg>`,
    faq: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
      <path d="M12 17h.01"/>
    </svg>`,
    wishlist: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
    </svg>`,
    user: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="8" r="5"/>
      <path d="M20 21a8 8 0 0 0-16 0"/>
    </svg>`
  };
  // ============================================
  // RENDER NAV
  // ============================================
  function getActivePath() {
    const path = window.location.pathname.replace(/\/$/, '') || '/';
    return path;
  }
  function renderNav(state) {
    const container = document.querySelector('.mobile-nav-inner');
    if (!container) return;
    const items = NAV_CONFIGS[state] || NAV_CONFIGS.guest;
    const activePath = getActivePath();
    container.innerHTML = items.map(item => {
      const isActive = activePath === item.href || 
                       (item.href !== '/' && activePath.startsWith(item.href));
      const activeClass = isActive ? ' is-active' : '';
      const tag = item.action ? 'button' : 'a';
      const hrefAttr = tag === 'a' ? `href="${item.href}"` : '';
      const actionAttr = item.action ? `data-nav-action="${item.action}"` : '';
      return `
        <${tag} class="mobile-nav-item${activeClass}" ${hrefAttr} ${actionAttr} aria-label="${item.label}">
          <span class="mobile-nav-icon">${ICONS[item.icon]}</span>
          <span class="mobile-nav-label">${item.label}</span>
        </${tag}>
      `;
    }).join('');
    // Attach action handlers
    container.querySelectorAll('[data-nav-action="login"]').forEach(btn => {
      btn.addEventListener('click', function(e) {
        e.preventDefault();
        if (typeof openAuthModal === 'function') {
          openAuthModal();
        } else if (window.auth0Client) {
          window.auth0Client.loginWithRedirect();
        }
      });
    });
    console.log('✅ Mobile nav rendered:', state);
  }
  // ============================================
  // DETECT USER STATE
  // ============================================
  async function detectUserState() {
    // Default to guest
    let state = 'guest';
    try {
      // Wait for auth0Client
      let attempts = 0;
      while (!window.auth0Client && attempts < 30) {
        await new Promise(r => setTimeout(r, 100));
        attempts++;
      }
      if (!window.auth0Client) {
        console.log('📱 Nav: No auth0 client, showing guest nav');
        return state;
      }
      const isAuthenticated = await window.auth0Client.isAuthenticated();
      if (!isAuthenticated) {
        console.log('📱 Nav: Not authenticated, showing guest nav');
        return state;
      }
      // User is logged in — check membership
      state = 'member_inactive';
      // Use UserMembership if available
      if (window.UserMembership) {
        const user = await UserMembership.fetch();
        if (user && user.stripe_id) {
          state = 'member_active';
          console.log('📱 Nav: Active member (has Stripe ID)');
        } else {
          console.log('📱 Nav: Logged in, no active membership');
        }
      }
    } catch (err) {
      console.error('📱 Nav: Error detecting state:', err);
    }
    return state;
  }
  // ============================================
  // INITIALIZE
  // ============================================
  async function initMobileNav() {
    // Render guest nav immediately so something shows
    renderNav('guest');
    // Then detect actual state and re-render if needed
    const state = await detectUserState();
    if (state !== 'guest') {
      renderNav(state);
    }
  }
  // Re-render nav when auth state changes (e.g. after login redirect)
  const originalUpdateAuthUI = window.updateAuthUI;
  window.updateAuthUI = function(isAuthenticated) {
    if (originalUpdateAuthUI) originalUpdateAuthUI(isAuthenticated);
    // Re-detect and re-render after auth state change
    detectUserState().then(state => renderNav(state));
  };
  // Also listen for auth0 callback completion
  async function watchForAuth() {
    let attempts = 0;
    while (attempts < 50) {
      await new Promise(r => setTimeout(r, 200));
      attempts++;
      if (window.auth0Client) {
        try {
          const isAuth = await window.auth0Client.isAuthenticated();
          if (isAuth) {
            const state = await detectUserState();
            renderNav(state);
            return;
          }
        } catch(e) {}
      }
    }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => {
      initMobileNav();
      watchForAuth();
    });
  } else {
    initMobileNav();
    watchForAuth();
  }
})();
</script>

  document.body.classList.add('checking-screen-size');
  function isMobile() {
    return window.innerWidth <= 767;
  }
  if (!isMobile()) {
    // Desktop user - redirect
    window.location.href = '/profile'; // Update this path
  } else {
    // Mobile user - show page
    document.body.classList.remove('checking-screen-size');
  }
  // Check on resize
  window.addEventListener('resize', function() {
    if (!isMobile()) {
      window.location.href = '/profile';
    }
  });
})();
